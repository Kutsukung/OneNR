<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>กลุ่มงานทันตกรรม รพ.นางรอง</title>

<!-- ===== iOS: icon + ชื่อ + โหมดเต็มจอ ===== -->
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ทันตกรรมนางรอง">

<!-- ===== Android/Chrome ===== -->
<link rel="icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#014886">

<style>
  html,body{margin:0;min-height:100%}
  body{
    min-height:100vh;box-sizing:border-box;padding:32px 22px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;
    font-family:-apple-system,"Sarabun",system-ui,sans-serif;color:#fff;
    background:linear-gradient(135deg,#014886 0%,#7E2BA6 55%,#D81E6E 100%);
  }
  .logo{width:128px;height:128px;border-radius:30px;background:#fff;padding:9px;box-sizing:border-box;
        box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .logo img{width:100%;height:100%;object-fit:contain;border-radius:21px}
  .t{font-size:18px;font-weight:700}
  .open{display:inline-block;margin-top:4px;padding:13px 30px;border-radius:14px;
        background:#fff;color:#014886;font-size:16px;font-weight:700;text-decoration:none;
        box-shadow:0 6px 18px rgba(0,0,0,.2)}
  .hint{font-size:13px;line-height:1.7;opacity:.95;max-width:300px;
        background:rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;margin-top:4px}
  .hint b{font-weight:700}
  .spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;
        border-radius:50%;animation:r .8s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .hide{display:none}
</style>
</head>
<body>
  <div class="logo"><img src="./icon-192.png" alt="logo"></div>
  <div class="t">กลุ่มงานทันตกรรม รพ.นางรอง</div>

  <!-- โหมดเปิดจาก icon หน้าโฮม: โชว์ตัวหมุนแล้วเด้งเข้าแอป -->
  <div id="launching" class="hide">
    <div class="spin" style="margin:6px auto"></div>
    <div class="hint" style="background:none">กำลังเปิดแอป…</div>
  </div>

  <!-- โหมดเปิดใน Safari ปกติ: โชว์ปุ่ม + วิธีเพิ่มลงหน้าโฮม (ไม่เด้งเอง จะได้ Add to Home Screen ทัน) -->
  <div id="browser">
    <a id="openBtn" class="open" href="#">เปิดแอป</a>
    <div class="hint">
      อยากได้เป็นแอปที่มี icon โลโก้บนหน้าโฮม:<br>
      แตะปุ่ม <b>แชร์</b> ⬆️ ด้านล่าง → <b>เพิ่มไปยังหน้าจอโฮม</b><br>
      (ทำบนหน้านี้ ก่อนกดเปิดแอป)
    </div>
  </div>

<script>
  // ลิงก์ /exec ของเว็บแอป
  var EXEC_URL = "https://script.google.com/macros/s/AKfycbx2Uz_wTd2OLFv8ylH0-6FgjEVEjWxlkQKojOarlr9qK3eq9Wg3eR-ac4BCBnns6mPX/exec";

  document.getElementById('openBtn').href = EXEC_URL;

  // เปิดจาก icon หน้าโฮม (standalone) → เด้งเข้าแอปเลย
  // เปิดใน Safari ปกติ → ไม่เด้ง โชว์ปุ่ม+วิธีเพิ่มลงโฮม
  var standalone = (window.navigator.standalone === true) ||
                   (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  if (standalone) {
    document.getElementById('browser').classList.add('hide');
    document.getElementById('launching').classList.remove('hide');
    setTimeout(function(){ window.location.replace(EXEC_URL); }, 250);
  }
</script>
</body>
</html>
